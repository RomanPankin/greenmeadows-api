services:
  db:
    image: postgres:16-alpine
    container_name: greenmeadows-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greenmeadows
    ports:
      - "5432:5432"
    volumes:
      - greenmeadows-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greenmeadows"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  greenmeadows-pgdata:
